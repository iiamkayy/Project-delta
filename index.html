<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Syntax Code — Atlas Developments AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#09090f;--bg2:#0f0f18;--bg3:#171724;--bg4:#1e1e2e;--bg5:#252535;
  --border:#2a2a3d;--text:#dcdcf0;--text2:#8888aa;--text3:#ffffff;
  --accent:#7c6dfa;--accent2:#9d8eff;--accent-hover:#9080ff;
  --green:#22d3a4;--red:#f87171;--purple:#c084fc;--cyan:#67e8f9;--orange:#fbbf24;
  --sidebar-w:280px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:14px;background:var(--bg);color:var(--text);overflow:hidden;}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-track{background:transparent;}

/* ── APP LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;}
#topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:50;}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.brand-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;color:white;font-size:14px;letter-spacing:-1px;}
.brand-name{font-size:17px;font-weight:700;color:var(--text3);letter-spacing:-0.4px;}
.brand-by{font-size:11px;color:var(--text2);margin-left:8px;font-weight:400;}
.topbar-spacer{flex:1;}
.topbar-btn{padding:7px 14px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:6px;}
.topbar-btn:hover{border-color:var(--accent);color:var(--text3);}
.topbar-btn.new-chat-top{background:var(--accent);border-color:var(--accent);color:white;}
.topbar-btn.new-chat-top:hover{background:var(--accent-hover);}

#workspace{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-hdr{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.sidebar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);}
.icon-btn{width:26px;height:26px;border-radius:5px;border:none;background:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;}
.icon-btn:hover{background:var(--bg4);color:var(--text);}
.chat-list{flex:1;overflow-y:auto;padding:8px;}
.chat-item{padding:10px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s;margin-bottom:4px;}
.chat-item:hover{background:var(--bg3);}
.chat-item.active{background:var(--bg4);border-color:var(--accent);}
.ci-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ci-meta{font-size:11px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:6px;}
.ci-del{opacity:0;background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;padding:0 2px;transition:opacity .15s;}
.chat-item:hover .ci-del{opacity:1;}

/* ── CHAT AREA ── */
#chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

/* ── CHAT TOPBAR ── */
#chat-top{padding:12px 24px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.model-select{padding:7px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;cursor:pointer;outline:none;transition:border-color .15s;}
.model-select:hover,.model-select:focus{border-color:var(--accent);}
.model-select optgroup{color:var(--text2);}
.mode-pills{display:flex;gap:6px;}
.mode-pill{padding:5px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;color:var(--text2);background:none;transition:all .15s;white-space:nowrap;}
.mode-pill:hover{border-color:var(--accent);color:var(--text);}
.mode-pill.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:600;}
.chat-top-spacer{flex:1;}
.status-pill{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);padding:4px 10px;border:1px solid var(--border);border-radius:20px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.status-dot.thinking{background:var(--orange);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── MESSAGES ── */
#messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:0;}
.msg-group{display:flex;flex-direction:column;gap:4px;margin-bottom:20px;}
.msg-row{display:flex;gap:14px;animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg-row.user-row{justify-content:flex-end;}
.msg-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.msg-avatar.ai-avatar{background:linear-gradient(135deg,var(--accent),var(--purple));}
.msg-avatar.user-avatar{background:linear-gradient(135deg,var(--green),var(--cyan));color:#000;}
.msg-wrap{flex:1;max-width:720px;}
.msg-row.user-row .msg-wrap{align-items:flex-end;display:flex;flex-direction:column;}
.msg-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.msg-name{font-size:13px;font-weight:600;color:var(--text3);}
.msg-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.5px;}
.badge-sol{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3);}
.badge-atlas{background:rgba(192,132,252,.15);color:#c084fc;border:1px solid rgba(192,132,252,.3);}
.badge-agent{background:rgba(103,232,249,.15);color:#67e8f9;border:1px solid rgba(103,232,249,.3);}
.subagent-row{margin-bottom:8px;}
.subagent-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(103,232,249,.08);border:1px solid rgba(103,232,249,.2);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--cyan);}
.subagent-chip::before{content:'⚡';}
.msg-time{font-size:11px;color:var(--text2);}
.msg-bubble{padding:14px 18px;border-radius:12px;font-size:14px;line-height:1.8;border:1px solid var(--border);background:var(--bg2);}
.user-row .msg-bubble{background:var(--accent);border-color:var(--accent);color:white;border-radius:12px 4px 12px 12px;}
.ai-bubble{border-radius:4px 12px 12px 12px;}
.msg-bubble pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;overflow-x:auto;margin:10px 0;font-family:'Consolas','Courier New',monospace;font-size:13px;line-height:1.6;}
.user-row .msg-bubble pre{background:rgba(0,0,0,.2);border-color:rgba(255,255,255,.1);}
.msg-bubble code:not(pre code){background:rgba(124,109,250,.15);padding:2px 6px;border-radius:4px;font-family:'Consolas','Courier New',monospace;font-size:13px;color:var(--accent2);}
.user-row .msg-bubble code:not(pre code){background:rgba(0,0,0,.2);color:rgba(255,255,255,.9);}
.msg-bubble strong{color:var(--text3);font-weight:600;}
.msg-bubble h3{margin-bottom:8px;font-size:15px;color:var(--text3);}
.msg-bubble ul,.msg-bubble ol{padding-left:20px;margin:8px 0;}
.msg-bubble li{margin-bottom:4px;}
.file-previews{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.file-preview-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(255,255,255,.1);border-radius:8px;font-size:12px;}
.file-preview-img{max-width:200px;max-height:150px;border-radius:8px;margin-top:8px;display:block;}
.typing-wrap{display:flex;gap:14px;align-items:center;}
.typing-dots{display:flex;gap:5px;padding:16px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:4px 12px 12px 12px;}
.typing-dot{width:8px;height:8px;border-radius:50%;background:var(--text2);animation:bounce .8s infinite;}
.typing-dot:nth-child(2){animation-delay:.16s;}
.typing-dot:nth-child(3){animation-delay:.32s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-7px);}}

/* ── EMPTY STATE ── */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;}
.es-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:800;color:white;font-size:28px;letter-spacing:-2px;}
.es-title{font-size:22px;font-weight:700;color:var(--text3);}
.es-sub{font-size:14px;color:var(--text2);max-width:480px;text-align:center;line-height:1.8;}
.model-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.model-card{padding:16px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:200px;cursor:pointer;transition:all .2s;}
.model-card:hover{border-color:var(--accent);background:var(--bg3);}
.mc-icon{font-size:24px;margin-bottom:8px;}
.mc-name{font-size:14px;font-weight:700;color:var(--text3);margin-bottom:4px;}
.mc-desc{font-size:12px;color:var(--text2);line-height:1.6;}
.suggest-chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.suggest-chip{padding:8px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;color:var(--text2);transition:all .15s;}
.suggest-chip:hover{border-color:var(--accent);color:var(--text);}

/* ── INPUT AREA ── */
#input-area{padding:16px 24px 20px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;}
.input-box{background:var(--bg3);border:2px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s;}
.input-box:focus-within{border-color:var(--accent);}
.input-top{padding:12px 14px 8px;}
#chat-input{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;resize:none;min-height:24px;max-height:180px;font-family:inherit;line-height:1.6;}
#chat-input::placeholder{color:var(--text2);}
.input-bot{display:flex;align-items:center;padding:6px 10px;border-top:1px solid var(--border);gap:8px;}
.input-attach-row{flex:1;display:flex;gap:6px;flex-wrap:wrap;}
.attach-chip{padding:5px 12px;background:var(--bg4);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .15s;white-space:nowrap;}
.attach-chip:hover{border-color:var(--accent);color:var(--text);}
.send-btn{padding:8px 20px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:background .15s;flex-shrink:0;}
.send-btn:hover:not(:disabled){background:var(--accent-hover);}
.send-btn:disabled{opacity:.45;cursor:not-allowed;}
.files-preview{display:flex;gap:8px;flex-wrap:wrap;padding:6px 10px 2px;border-top:1px solid var(--border);}
.fp-chip{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--bg4);border-radius:6px;font-size:12px;color:var(--text);}
.fp-rm{cursor:pointer;color:var(--red);font-size:14px;font-weight:700;line-height:1;}
.fp-rm:hover{color:#ff4444;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:9999;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;min-width:440px;max-width:600px;max-height:85vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.6);}
.modal h2{font-size:20px;font-weight:700;color:var(--text3);text-align:center;margin-bottom:20px;}
.modal-close{position:absolute;top:16px;right:16px;}
.modal-actions{display:flex;gap:10px;justify-content:center;margin-top:24px;}
.btn{padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;}
.btn:hover{border-color:var(--accent);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:white;}
.btn-primary:hover{background:var(--accent-hover);}
</style>
</head>
<body>

<div id="app">
  <!-- Top Bar -->
  <div id="topbar">
    <div class="brand">
      <div class="brand-icon">SC</div>
      <span class="brand-name">Syntax Code</span>
      <span class="brand-by">by Atlas Developments</span>
    </div>
    <div class="topbar-spacer"></div>
    <button class="topbar-btn" onclick="toggleSidebar()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect y="0" width="14" height="2" rx="1"/><rect y="5" width="14" height="2" rx="1"/><rect y="10" width="14" height="2" rx="1"/></svg>
      Chats
    </button>
    <button class="topbar-btn new-chat-top" onclick="newChat()">+ New chat</button>
    <button class="topbar-btn" onclick="showAbout()">About</button>
  </div>

  <!-- Workspace -->
  <div id="workspace">

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-hdr">
        <span class="sidebar-title">Conversations</span>
        <button class="icon-btn" onclick="newChat()" title="New Chat">+</button>
      </div>
      <div class="chat-list" id="chat-list">
        <!-- rendered by JS -->
      </div>
    </div>

    <!-- Chat Area -->
    <div id="chat-area">
      <!-- Chat toolbar -->
      <div id="chat-top">
        <select class="model-select" id="model-select" onchange="onModelChange(this.value)">
          <optgroup label="Sol 1.6 — Roblox Lua Specialist">
            <option value="sol-1.6-fast">Sol 1.6 · Fast</option>
            <option value="sol-1.6-reasoning" selected>Sol 1.6 · Reasoning</option>
            <option value="sol-1.6-deep-think">Sol 1.6 · Deep Think</option>
            <option value="sol-1.6-agent">Sol 1.6 · Agent</option>
          </optgroup>
          <optgroup label="Atlas 1.1 — Vector Lua Engine">
            <option value="atlas-1.1-fast">Atlas 1.1 · Fast</option>
            <option value="atlas-1.1-reasoning">Atlas 1.1 · Reasoning</option>
            <option value="atlas-1.1-deep-think">Atlas 1.1 · Deep Think</option>
            <option value="atlas-1.1-deep-reasoning">Atlas 1.1 · Deep Reasoning</option>
            <option value="atlas-1.1-agent">Atlas 1.1 · Agent</option>
          </optgroup>
        </select>
        <div class="mode-pills" id="mode-pills">
          <button class="mode-pill active" data-mode="chat" onclick="setMode('chat')">Chat</button>
          <button class="mode-pill" data-mode="agent" onclick="setMode('agent')">Agent</button>
          <button class="mode-pill" data-mode="debug" onclick="setMode('debug')">Debug</button>
          <button class="mode-pill" data-mode="explain" onclick="setMode('explain')">Explain</button>
        </div>
        <div class="chat-top-spacer"></div>
        <div class="status-pill">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Ready</span>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages"></div>

      <!-- Input Area -->
      <div id="input-area">
        <div class="input-box">
          <div class="input-top">
            <textarea id="chat-input" rows="1"
              placeholder="Ask Sol 1.6 or Atlas 1.1… (Enter to send, Shift+Enter for new line)"
              oninput="autoResize(this)"
              onkeydown="handleKey(event)"></textarea>
          </div>
          <div id="files-preview" class="files-preview" style="display:none;"></div>
          <div class="input-bot">
            <div class="input-attach-row">
              <input type="file" id="file-input" multiple accept="*/*" style="display:none" onchange="handleFiles(this)"/>
              <input type="file" id="img-input" multiple accept="image/*" style="display:none" onchange="handleFiles(this)"/>
              <button class="attach-chip" onclick="document.getElementById('file-input').click()">📎 Files</button>
              <button class="attach-chip" onclick="document.getElementById('img-input').click()">🖼️ Images</button>
              <button class="attach-chip" onclick="insertCodeSnippet()">{ } Code</button>
            </div>
            <button class="send-btn" id="send-btn" onclick="sendMessage()">Send ↑</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- About Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  STATE & CONSTANTS
// ═══════════════════════════════════════════════════════════
const state = {
  chats: [],
  activeChatId: null,
  currentModel: 'sol-1.6-reasoning',
  currentMode: 'chat',
  attachedFiles: [],
  thinking: false,
};

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadFromStorage();
  if (state.chats.length === 0) newChat();
  renderChatList();
  renderMessages();
});

function loadFromStorage() {
  const saved = localStorage.getItem('syntax-code-data');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (parsed.chats && parsed.chats.length > 0) {
        state.chats = parsed.chats;
        state.activeChatId = parsed.activeChatId || state.chats[0].id;
      }
    } catch (e) {}
  }
}

function saveToStorage() {
  localStorage.setItem('syntax-code-data', JSON.stringify({
    chats: state.chats,
    activeChatId: state.activeChatId,
  }));
}

// ═══════════════════════════════════════════════════════════
//  CHAT MANAGEMENT
// ═══════════════════════════════════════════════════════════
function newChat() {
  const id = 'chat_' + Date.now();
  state.chats.unshift({
    id,
    title: 'New conversation',
    messages: [],
    created: new Date().toISOString(),
  });
  state.activeChatId = id;
  renderChatList();
  renderMessages();
  saveToStorage();
}

function switchChat(id) {
  state.activeChatId = id;
  renderChatList();
  renderMessages();
}

function deleteChat(id, e) {
  e?.stopPropagation();
  if (!confirm('Delete this conversation?')) return;
  state.chats = state.chats.filter(c => c.id !== id);
  if (state.activeChatId === id) {
    if (state.chats.length > 0) state.activeChatId = state.chats[0].id;
    else newChat();
  }
  renderChatList();
  renderMessages();
  saveToStorage();
}

function renderChatList() {
  const list = document.getElementById('chat-list');
  list.innerHTML = state.chats.map(c => `
    <div class="chat-item ${c.id === state.activeChatId ? 'active' : ''}" onclick="switchChat('${c.id}')">
      <div class="ci-title">${escHtml(c.title)}</div>
      <div class="ci-meta">
        ${formatDate(c.created)}
        <span>·</span>
        ${c.messages.length} messages
        <button class="ci-del" onclick="deleteChat('${c.id}',event)">✕</button>
      </div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════════════════
//  MESSAGES
// ═══════════════════════════════════════════════════════════
function renderMessages() {
  const chat = state.chats.find(c => c.id === state.activeChatId);
  const container = document.getElementById('messages');
  
  if (!chat || chat.messages.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="es-logo">SC</div>
        <div class="es-title">Start your conversation</div>
        <div class="es-sub">
          Choose **Sol 1.6** for Roblox Luau scripting or **Atlas 1.1** for Vector Lua Engine development. Upload files, images, or code for context-aware assistance.
        </div>
        <div class="suggest-chips">
          <div class="suggest-chip" onclick="insertSuggestion('Create a leaderstats system with DataStore')">💰 Leaderstats + DataStore</div>
          <div class="suggest-chip" onclick="insertSuggestion('Build a modern GUI with buttons')">🎨 Modern GUI</div>
          <div class="suggest-chip" onclick="insertSuggestion('Write a Vector raycast system')">🎯 Raycast system</div>
          <div class="suggest-chip" onclick="insertSuggestion('Explain dot product for facing detection')">📐 Dot product</div>
        </div>
      </div>
    `;
    return;
  }

  container.innerHTML = chat.messages.map(m => {
    if (m.role === 'user') {
      return `
        <div class="msg-row user-row">
          <div class="msg-wrap">
            <div class="msg-meta">
              <span class="msg-name">You</span>
              <span class="msg-time">${formatTime(m.timestamp)}</span>
            </div>
            ${m.files && m.files.length > 0 ? `
              <div class="file-previews">
                ${m.files.map(f => `<div class="file-preview-chip">${f.type.startsWith('image/') ? '🖼️' : '📄'} ${escHtml(f.name)}</div>`).join('')}
              </div>
            ` : ''}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const content = input.value.trim();
  if (!content && state.attachedFiles.length === 0) return;
  if (state.thinking) return;

  const chat = state.chats.find(c => c.id === state.activeChatId);
  if (!chat) return;

  const userMsg = {
    role: 'user',
    content,
    files: [...state.attachedFiles],
    timestamp: Date.now(),
  };
  chat.messages.push(userMsg);

  if (chat.messages.length === 1) {
    chat.title = content.substring(0, 60) + (content.length > 60 ? '...' : '');
  }

  input.value = '';
  autoResize(input);
  state.attachedFiles = [];
  document.getElementById('files-preview').style.display = 'none';
  document.getElementById('files-preview').innerHTML = '';
  
  renderChatList();
  renderMessages();
  saveToStorage();

  generateAIResponse(chat, userMsg);
}

async function generateAIResponse(chat, userMsg) {
  state.thinking = true;
  document.getElementById('status-dot').classList.add('thinking');
  document.getElementById('status-text').textContent = 'Thinking...';
  document.getElementById('send-btn').disabled = true;

  const messages = document.getElementById('messages');
  const thinkingDiv = document.createElement('div');
  thinkingDiv.className = 'typing-wrap';
  thinkingDiv.innerHTML = `
    <div class="msg-avatar ai-avatar">AI</div>
    <div class="typing-dots">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  `;
  messages.appendChild(thinkingDiv);
  messages.scrollTop = messages.scrollHeight;

  const delay = getModelDelay(state.currentModel);
  await new Promise(resolve => setTimeout(resolve, delay));

  messages.removeChild(thinkingDiv);

  const response = await buildAIResponse(userMsg, state.currentModel, state.currentMode, chat);
  
  const aiMsg = {
    role: 'assistant',
    content: response.text,
    model: state.currentModel,
    subagent: response.subagent,
    timestamp: Date.now(),
  };
  chat.messages.push(aiMsg);

  state.thinking = false;
  document.getElementById('status-dot').classList.remove('thinking');
  document.getElementById('status-text').textContent = 'Ready';
  document.getElementById('send-btn').disabled = false;
  
  renderMessages();
  saveToStorage();
}

async function buildAIResponse(userMsg, model, mode, chat) {
  if (model.startsWith('sol-')) {
    return generateSolResponse(userMsg, model, mode);
  } else {
    return generateAtlasResponse(userMsg, model, mode);
  }
}

function getModelDelay(model) {
  if (model.includes('fast')) return 700 + Math.random() * 400;
  if (model.includes('deep')) return 2400 + Math.random() * 1400;
  if (model.includes('agent')) return 1800 + Math.random() * 1000;
  return 1300 + Math.random() * 900;
}

function getModelName(model) {
  const names = {
    'sol-1.6-fast': 'Sol 1.6 Fast',
    'sol-1.6-reasoning': 'Sol 1.6 Reasoning',
    'sol-1.6-deep-think': 'Sol 1.6 Deep Think',
    'sol-1.6-agent': 'Sol 1.6 Agent',
    'atlas-1.1-fast': 'Atlas 1.1 Fast',
    'atlas-1.1-reasoning': 'Atlas 1.1 Reasoning',
    'atlas-1.1-deep-think': 'Atlas 1.1 Deep Think',
    'atlas-1.1-deep-reasoning': 'Atlas 1.1 Deep Reasoning',
    'atlas-1.1-agent': 'Atlas 1.1 Agent',
  };
  return names[model] || model;
}

function generateAtlasResponse(userMsg, model, mode) {
  const p = userMsg.content.toLowerCase();

  if (mode === 'agent' || model.includes('agent') || model.includes('deep-reasoning')) {

  } else if (t.esp || t.draw) {
    text = `**Atlas 1.1 · ${variant} — ESP & Draw System**${fileNote}\n\nComplete ESP with box, health bar, name, and distance:\n\n\`\`\`lua\n-- Vector Lua Engine — Complete ESP\nmenu.add_tab("ESP", "E")\nmenu.add_group("ESP", "Visuals")\nmenu.add_checkbox("ESP", "Visuals", "esp_en", "Enable ESP", true)\nmenu.add_checkbox("ESP", "Visuals", "box_en", "Box ESP", true)\nmenu.add_checkbox("ESP", "Visuals", "name_en", "Names", true)\nmenu.add_checkbox("ESP", "Visuals", "health_en", "Health Bar", true)\nmenu.add_checkbox("ESP", "Visuals", "dist_en", "Distance", true)\nmenu.add_slider_int("ESP", "Visuals", "max_dist", "Max Distance", 50, 500, 200, "%dm")\nmenu.add_colorpicker("ESP", "Visuals", "esp_col", "ESP Color", {0, 1, 0.5, 1})\n\nlocal function draw_player_esp(player)\n\tif not utility.is_valid(player) then return end\n\t\n\t-- Get bounding box\n\tlocal bounds = player:get_bounds()\n\tif not bounds then return end\n\t\n\tlocal x, y, w, h = bounds.x, bounds.y, bounds.width, bounds.height\n\tlocal col = menu.get_color("esp_col")\n\n\t-- Box\n\tif menu.get("box_en") then\n\t\tdraw.box(x, y, w, h, col, 0, 1)\n\tend\n\n\t-- Health bar\n\tif menu.get("health_en") then\n\t\tlocal hp = player.health\n\t\tlocal max_hp = player.max_health\n\t\tif max_hp and max_hp > 0 then\n\t\t\tdraw.health_bar(x - 6, y, h, hp, max_hp)\n\t\tend\n\tend\n\n\t-- Name\n\tif menu.get("name_en") then\n\t\tdraw.text(x + w * 0.5, y - 16, player.name, {1, 1, 1, 1}, 13)\n\tend\n\n\t-- Distance\n\tif menu.get("dist_en") then\n\t\tlocal lp = entity.get_local_player()\n\t\tif utility.is_valid(lp) then\n\t\t\tlocal dp = player.position\n\t\t\tlocal lp_pos = lp.position\n\t\t\tif dp and lp_pos then\n\t\t\t\tlocal dx = dp.x - lp_pos.x\n\t\t\t\tlocal dy = dp.y - lp_pos.y\n\t\t\t\tlocal dz = dp.z - lp_pos.z\n\t\t\t\tlocal dist = math.sqrt(dx*dx + dy*dy + dz*dz)\n\t\t\t\tdraw.text(x + w * 0.5, y + h + 4, math.floor(dist) .. "m", {0.8,0.8,0.8,1}, 11)\n\t\t\tend\n\t\tend\n\tend\nend\n\nfunction on_frame()\n\tif not menu.get("esp_en") then return end\n\t\n\tlocal local_player = entity.get_local_player()\n\tlocal players = entity.get_players()\n\tlocal max_dist = menu.get("max_dist")\n\t\n\tfor _, player in ipairs(players) do\n\t\tif player == local_player then goto continue end\n\t\tif not utility.is_valid(player) then goto continue end\n\t\t\n\t\t-- Distance check\n\t\tif local_player and local_player.position and player.position then\n\t\t\tlocal dx = player.position.x - local_player.position.x\n\t\t\tlocal dz = player.position.z - local_player.position.z\n\t\t\tif math.sqrt(dx*dx + dz*dz) > max_dist then\n\t\t\t\tgoto continue\n\t\t\tend\n\t\tend\n\t\t\n\t\tdraw_player_esp(player)\n\t\t::continue::\n\tend\nend\n\`\`\``;

function handleFiles(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const isImage = file.type.startsWith('image/');
    const reader = new FileReader();
    reader.onload = e => {
      state.attachedFiles.push({
        name: file.name,
        type: file.type,
        size: file.size,
        content: isImage ? null : e.target.result,
        dataUrl: isImage ? e.target.result : null,
      });
      renderFilesPreview();
    };
    if (isImage) {
      reader.readAsDataURL(file);
    } else {
      reader.readAsText(file);
    }
  });
  input.value = '';
}

function renderFilesPreview() {
  const container = document.getElementById('files-preview');
  if (state.attachedFiles.length === 0) {
    container.style.display = 'none';
    container.innerHTML = '';
    return;
  }
  container.style.display = 'flex';
  container.innerHTML = state.attachedFiles.map((f, i) => `
    <div class="fp-chip">
      ${f.type.startsWith('image/') ? '🖼️' : '📄'}
      <span>${escHtml(f.name)}</span>
      <span class="fp-rm" onclick="removeFile(${i})">✕</span>
    </div>
  `).join('');
}

function removeFile(index) {
  state.attachedFiles.splice(index, 1);
  renderFilesPreview();
}

function insertCodeSnippet() {
  const input = document.getElementById('chat-input');
  const snippet = '```lua\n-- paste your code here\n```';

//  MESSAGE FORMATTING
// ═══════════════════════════════════════════════════════════
function formatUserMsg(content) {
  return escHtml(content).replace(/\n/g, '<br>');
}

function formatAiMsg(content) {
  // Fenced code blocks
  content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;
  });
  // Inline code
  content = content.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // Bold
  content = content.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  // Italic (standalone *)
  content = content.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  // Headers (##)
  content = content.replace(/^##\s+(.+)$/gm, '<h3>$1</h3>');
  // Bullet lists (- and *)
  content = content.replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>');
  content = content.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Line breaks
  content = content.replace(/\n/g, '<br>');
  return content;
}

function escHtml(str) {
  const el = document.createElement('div');
  el.textContent = str;
  return el.innerHTML;
}

function formatTime(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

function formatDate(iso) {
  if (!iso) return '';
  const date = new Date(iso);
  const now = new Date();
  const diffMs = now - date;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  if (diffDays === 0) return 'Today';
  if (diffDays === 1) return 'Yesterday';
  if (diffDays < 7) return diffDays + 'd ago';
  return date.toLocaleDateString();
}

// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    newChat();
  }
  if (e.key === 'Escape') {
    closeModal();
  }
});
</script>
</body>
</html>
